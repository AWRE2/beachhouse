backend:
  name: github
  repo: AWRE2/beachhouse
  branch: main
  base_url: https://beachhouse.vercel.app

media_folder: images
public_folder: /images

locale: en

collections:
  - name: content
    label: "✏️ Text & Fonts"
    files:
      - label: "All Text & Fonts"
        name: all_content
        file: _data/content.json
        fields:
          - label: "🎨 Font Style"
            name: font_style
            widget: select
            options:
              - label: "Luxury — Fraunces + Inter (recommended)"
                value: luxury
              - label: "Classic — Cormorant + Jakarta"
                value: classic
              - label: "Modern — Playfair + Inter"
                value: modern
              - label: "Minimal — DM Serif + DM Sans"
                value: minimal
            default: luxury
            hint: "Changes the font style across the entire website."

          - label: "── HERO SECTION ──"
            name: _sep1
            widget: hidden
            required: false

          - label: "Badge Text"
            name: hero_badge
            widget: string
            hint: "Small text above the main title. E.g. 'Dominion Beach · New Golden Mile · Estepona'"

          - label: "Headline — Line 1"
            name: hero_h1_line1
            widget: string
            hint: "First line of the big hero title. E.g. 'Luxury Beachfront'"

          - label: "Headline — Line 2 (italic)"
            name: hero_h1_line2
            widget: string
            hint: "Second line shown in italic. E.g. 'Living in Estepona'"

          - label: "Subtitle"
            name: hero_subtitle
            widget: string
            hint: "Small text below the headline."

          - label: "── STORY SECTION ──"
            name: _sep2
            widget: hidden
            required: false

          - label: "Story Tag"
            name: story_tag
            widget: string

          - label: "Story Heading"
            name: story_heading
            widget: string

          - label: "Story Paragraph 1"
            name: story_body1
            widget: text

          - label: "Story Paragraph 2"
            name: story_body2
            widget: text

          - label: "Bullet Point 1"
            name: story_bullet1
            widget: string

          - label: "Bullet Point 2"
            name: story_bullet2
            widget: string

          - label: "Bullet Point 3"
            name: story_bullet3
            widget: string

          - label: "Bullet Point 4"
            name: story_bullet4
            widget: string

          - label: "Bullet Point 5"
            name: story_bullet5
            widget: string

          - label: "── PHOTO CARD LABELS ──"
            name: _sep_caps
            widget: hidden
            required: false

          - label: "Card Label — Terrace & Garden"
            name: cap_home_terrace
            widget: string

          - label: "Card Label — Master Bedroom"
            name: cap_home_bedroom
            widget: string

          - label: "Card Label — Kitchen"
            name: cap_home_kitchen
            widget: string

          - label: "Card Label — Bathroom"
            name: cap_home_bathroom
            widget: string

          - label: "Card Label — Living Room"
            name: cap_home_living
            widget: string

          - label: "Card Label — Lounge & Dining"
            name: cap_home_lounge
            widget: string

          - label: "Card Label — Sea View"
            name: cap_home_seaview
            widget: string

          - label: "Card Label — Exterior & Entrance"
            name: cap_home_exterior
            widget: string

          - label: "── QUOTE BANNER ──"
            name: _sep3
            widget: hidden
            required: false

          - label: "Quote Text"
            name: quote_text
            widget: text
            hint: "The large italic quote shown in the banner between sections."

          - label: "── BOOKING SECTION ──"
            name: _sep4
            widget: hidden
            required: false

          - label: "Price Per Night (€)"
            name: price_per_night
            widget: string
            hint: "Number only, e.g. 500"

          - label: "Minimum Nights"
            name: min_nights
            widget: string
            hint: "Number only, e.g. 6"

          - label: "── CONTACT ──"
            name: _sep5
            widget: hidden
            required: false

          - label: "Email Address"
            name: contact_email
            widget: string

          - label: "Phone / WhatsApp"
            name: contact_phone
            widget: string
            hint: "Include country code, e.g. +34 630 428 779"

          - label: "Location Text"
            name: contact_location
            widget: text
            hint: "Use a new line for line 2."

  - name: photos
    label: "📸 Photos"
    files:
      - label: "All Photos"
        name: all_photos
        file: _data/photos.json
        fields:
          - label: "🏠 Hero (Front Page Background)"
            name: hero
            widget: image
            required: false
            hint: "Main photo shown on the front page. Landscape orientation works best."

          - label: "📖 Story Section Photo"
            name: story_main
            widget: image
            required: false

          - label: "🌿 Home — Terrace & Garden"
            name: home_terrace
            widget: image
            required: false

          - label: "🛏 Home — Master Bedroom"
            name: home_bedroom
            widget: image
            required: false

          - label: "🍳 Home — Kitchen"
            name: home_kitchen
            widget: image
            required: false

          - label: "🛁 Home — Bathroom"
            name: home_bathroom
            widget: image
            required: false

          - label: "🛋 Home — Living Room"
            name: home_living
            widget: image
            required: false

          - label: "🍽 Home — Lounge & Dining"
            name: home_lounge
            widget: image
            required: false

          - label: "🌊 Home — Sea View"
            name: home_seaview
            widget: image
            required: false

          - label: "🚪 Home — Exterior & Entrance"
            name: home_exterior
            widget: image
            required: false

          - label: "🏖 Resort Photo 1 (Wide)"
            name: resort_1
            widget: image
            required: false
            hint: "Displayed as a wide banner (spans 2 columns)."

          - label: "🏊 Resort Photo 2"
            name: resort_2
            widget: image
            required: false

          - label: "🌴 Resort Photo 3"
            name: resort_3
            widget: image
            required: false

          - label: "🏡 Resort Photo 4 (Wide)"
            name: resort_4
            widget: image
            required: false
            hint: "Displayed as a wide banner (spans 2 columns)."

          - label: "☀️ Resort Photo 5"
            name: resort_5
            widget: image
            required: false

          - label: "🌅 Resort Photo 6"
            name: resort_6
            widget: image
            required: false
